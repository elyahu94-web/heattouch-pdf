<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<title>עריכת שדות</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#1a1a2e;color:#eee;direction:rtl;overflow:hidden}
.toolbar{background:#16213e;padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:2px solid #e67e22;height:50px}
.toolbar h1{font-size:14px;color:#e67e22;flex:1}
.toolbar button{padding:7px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700}
.btn-save{background:#27ae60;color:white}
.btn-reset{background:#888;color:white}
#status{padding:5px 10px;border-radius:4px;font-size:12px;display:none;background:#27ae60;color:white}
.main{display:flex;height:calc(100vh - 50px)}
.panel{width:190px;background:#0f3460;padding:10px;overflow-y:auto;flex-shrink:0;border-left:2px solid #333}
.panel h3{color:#e67e22;font-size:12px;margin-bottom:8px}
.chip{background:#1a4a80;border:2px solid #e67e22;border-radius:5px;padding:6px 8px;margin-bottom:6px;cursor:grab;font-size:11px;user-select:none}
.chip.placed{border-color:#27ae60;background:#1a5a30}
.chip .lbl{font-weight:700;color:#fff}
.chip .key{font-size:9px;color:#aaa;font-family:monospace}
.canvas-area{flex:1;overflow:auto;background:#333;padding:16px;display:flex;justify-content:center;align-items:flex-start}
#wrap{position:relative;display:inline-block;flex-shrink:0;cursor:crosshair}
#wrap img{display:block;pointer-events:none}
.box{position:absolute;border:2px solid #e67e22;background:rgba(230,126,34,0.15);cursor:move;min-width:20px;min-height:10px}
.box.selected{border-color:#fff;background:rgba(255,255,255,0.15)}
.box .label{position:absolute;top:-18px;right:0;background:#e67e22;color:white;font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;white-space:nowrap;pointer-events:none}
.box .del{position:absolute;top:-18px;left:0;background:#c0392b;color:white;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;cursor:pointer}
.box .resize{position:absolute;bottom:-4px;left:-4px;width:10px;height:10px;background:#e67e22;border-radius:50%;cursor:se-resize}
.info{font-size:10px;color:#aaa;margin-top:10px;background:#0a2040;padding:6px;border-radius:4px;line-height:1.7}
.sel-info{font-size:10px;color:#7fc;margin-top:8px;background:#0a3020;padding:6px;border-radius:4px;line-height:1.7;display:none}
</style>
</head>
<body>
<div class="toolbar">
  <h1>🔧 עריכת שדות — גרור מהפאנל, שנה גודל עם הנקודה</h1>
  <span id="status"></span>
  <button class="btn-reset" onclick="doReset()">↺ נקה</button>
  <button class="btn-save" onclick="doSave()">💾 שמור JSON</button>
</div>
<div class="main">
  <div class="panel">
    <h3>← גרור לדף</h3>
    <div id="field-list"></div>
    <div class="info">

      3. <strong>נקודה כתומה</strong> = שנה גודל<br>
      4. לחץ שמור JSON
    </div>
    <div class="sel-info" id="sel-info"></div>
  </div>

": 50, "h": 14, "font_size": 9, "align": "center", "bold": false, "ltr": true}, {"key": "item4", "label": "פריט 4", "x": 359.0243385173247, "y": 495.1983540478905, "w": 280, "h": 14, "font_size": 9, "align": "right", "bold": false, "ltr": true}, {"key": "qty4", "label": "כמות 4", "x": 67.54487885898467, "y": 495.1983540478905, "w": 50, "h": 14, "font_size": 9, "align": "center", "bold": false, "ltr": true}, {"key": "item5", "label": "פריט 5", "x": 358.5446640612409, "y": 522.8021704104902, "w": 280, "h": 14, "font_size": 9, "align": "right", "bold": false, "ltr": true}, {"key": "qty5", "label": "כמות 5", "x": 67.54487885898467, "y": 521.3622217217788, "w": 50, "h": 14, "font_size": 9, "align": "center", "bold": false, "ltr": true}, {"key": "total", "label": "סך הכל", "x": 232.13797334730057, "y": 569.0821212656786, "w": 150, "h": 14, "font_size": 11, "align": "right", "bold": true, "ltr": false}]};
const FIELDS=CONFIG.fields;
let placed={};
let selectedKey=null;

const wrap=document.getElementById('wrap');
const img=document.getElementById('pdfimg');
const selInfo=document.getElementById('sel-info');

// Build panel
const list=document.getElementById('field-list');
FIELDS.forEach(f=>{
  const d=document.createElement('div');
  d.className='chip'; d.id='chip_'+f.key; d.draggable=true;
  d.innerHTML=`<div class="lbl">${f.label}</div><div class="key">${f.key}</div>`;
  d.addEventListener('dragstart',e=>e.dataTransfer.setData('key',f.key));
  list.appendChild(d);
});

// Drop new field
wrap.addEventListener('dragover',e=>e.preventDefault());
wrap.addEventListener('drop',e=>{
  e.preventDefault();
  const key=e.dataTransfer.getData('key');
  if(!key) return;
  const rect=img.getBoundingClientRect();
  const xPdf=((e.clientX-rect.left)/img.offsetWidth)*PDF_W;
  const yPdf=((e.clientY-rect.top)/img.offsetHeight)*PDF_H;
  const f=FIELDS.find(f=>f.key===key)||{};
  addBox(key, xPdf, yPdf, f.w||120, f.h||14, f.font_size||10, f.align||'right', !!f.bold, !!f.ltr, f.label||key);
});

function pdfToImg(xPdf,yPdf,wPdf,hPdf){
  return {
    x: (xPdf/PDF_W)*img.offsetWidth,
    y: (yPdf/PDF_H)*img.offsetHeight,
    w: (wPdf/PDF_W)*img.offsetWidth,
    h: (hPdf/PDF_H)*img.offsetHeight
  };
}
function imgToPdf(xPx,yPx,wPx,hPx){
  return {
    x: (xPx/img.offsetWidth)*PDF_W,
    y: (yPx/img.offsetHeight)*PDF_H,
    w: (wPx/img.offsetWidth)*PDF_W,
    h: (hPx/img.offsetHeight)*PDF_H
  };
}

function addBox(key,xPdf,yPdf,wPdf,hPdf,fs,align,bold,ltr,label){
  document.getElementById('b_'+key)?.remove();
  const f=FIELDS.find(f=>f.key===key)||{};
  placed[key]={x:xPdf,y:yPdf,w:wPdf,h:hPdf,font_size:fs,align,bold,ltr};
  document.getElementById('chip_'+key)?.classList.add('placed');

  const px=pdfToImg(xPdf,yPdf,wPdf,hPdf);
  const el=document.createElement('div');
  el.className='box'; el.id='b_'+key;
  el.style.left=px.x+'px'; el.style.top=px.y+'px';
  el.style.width=px.w+'px'; el.style.height=px.h+'px';
  el.innerHTML=`
    <div class="label">${label}</div>
    <div class="del" onclick="removeBox('${key}')">✕</div>
    <div class="resize" id="r_${key}"></div>
  `;

  // Move
  let sx,sy,sl,st;
  el.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('del')||e.target.classList.contains('resize')) return;
    e.preventDefault(); selectBox(key);
    sx=e.clientX; sy=e.clientY;
    sl=parseFloat(el.style.left); st=parseFloat(el.style.top);
    const mm=e2=>{
      const nl=sl+e2.clientX-sx, nt=st+e2.clientY-sy;
      el.style.left=nl+'px'; el.style.top=nt+'px';
      const p=imgToPdf(nl,nt,parseFloat(el.style.width),parseFloat(el.style.height));
      placed[key].x=p.x; placed[key].y=p.y;
      updateSelInfo(key);
    };
    const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu)};
    document.addEventListener('mousemove',mm); document.addEventListener('mouseup',mu);
  });

  // Resize
  const rh=el.querySelector('.resize');
  rh.addEventListener('mousedown',e=>{
    e.preventDefault(); e.stopPropagation(); selectBox(key);
    const startX=e.clientX, startY=e.clientY;
    const startW=parseFloat(el.style.width), startH=parseFloat(el.style.height);
    const mm=e2=>{
      const nw=Math.max(20,startW+e2.clientX-startX);
      const nh=Math.max(8, startH+e2.clientY-startY);
      el.style.width=nw+'px'; el.style.height=nh+'px';
      const p=imgToPdf(parseFloat(el.style.left),parseFloat(el.style.top),nw,nh);
      placed[key].w=p.w; placed[key].h=p.h;
      updateSelInfo(key);
    };
    const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu)};
    document.addEventListener('mousemove',mm); document.addEventListener('mouseup',mu);
  });

  wrap.appendChild(el);
  selectBox(key);
}

function selectBox(key){
  document.querySelectorAll('.box').forEach(b=>b.classList.remove('selected'));
  document.getElementById('b_'+key)?.classList.add('selected');
  selectedKey=key;
  updateSelInfo(key);
}

function updateSelInfo(key){
  const p=placed[key];
  if(!p)return;
  selInfo.style.display='block';
  selInfo.innerHTML=`<strong>${key}</strong><br>x=${p.x.toFixed(1)} y=${p.y.toFixed(1)}<br>w=${p.w.toFixed(1)} h=${p.h.toFixed(1)}`;
}

function removeBox(key){
  document.getElementById('b_'+key)?.remove();
  document.getElementById('chip_'+key)?.classList.remove('placed');
  delete placed[key];
  if(selectedKey===key){ selectedKey=null; selInfo.style.display='none'; }
}

function doReset(){
  document.querySelectorAll('.box').forEach(e=>e.remove());
  document.querySelectorAll('.chip').forEach(e=>e.classList.remove('placed'));
  placed={}; selectedKey=null; selInfo.style.display='none';
}

function doSave(){
  const updated=FIELDS.map(f=>{
    const p=placed[f.key];
    return p ? {...f,...p} : f;
  });
  const out={page_width:PDF_W,page_height:PDF_H,fields:updated};
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='fields_template.json'; a.click();
  showStatus('✅ הורד! העלה לגיטהאב');
}

function showStatus(msg){
  const s=document.getElementById('status');
  s.textContent=msg; s.style.display='inline-block';
  setTimeout(()=>s.style.display='none',3000);
}

// Load existing positions
FIELDS.forEach(f=>{
  if(f.x!==undefined)
    addBox(f.key,f.x,f.y,f.w,f.h||14,f.font_size||10,f.align||'right',!!f.bold,!!f.ltr,f.label);
});
</script>
</body>
